<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Smart IT Solutions</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <header>
    <h1>Admin Panel</h1>
    <p>Smart IT Solutions Backend</p>
  </header>

  <!-- Login Section -->
  <section id="login-section" class="admin-section">
    <h2>Admin Login</h2>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Log In</button>
      <p id="login-error" style="color:red; display:none;">Invalid credentials</p>
    </form>
  </section>

  <!-- Dashboard Section -->
  <section id="dashboard-section" class="admin-section" style="display:none;">
    <div class="dashboard-header">
      <h2>Contact Messages</h2>
      <button id="logout-btn">Log Out</button>
    </div>
    
    <div class="table-container">
      <table id="contacts-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="contacts-body">
          <!-- Data populated here -->
        </tbody>
      </table>
    </div>
  </section>

  <script src="admin.js"></script>
</body>
</html>
